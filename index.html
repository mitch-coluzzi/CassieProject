<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request A Treat 🍰</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="screen-login" class="screen active"></div>

    <!-- Name Selection Screen -->
    <div id="screen-names" class="screen"></div>

    <!-- Order Form Screen -->
    <div id="screen-order" class="screen"></div>

    <!-- Already Ordered Screen -->
    <div id="screen-already" class="screen"></div>

    <!-- Celebration Screen -->
    <div id="screen-celebrate" class="screen"></div>

    <!-- Gallery Screen -->
    <div id="screen-gallery" class="screen"></div>

    <!-- Baker View Screen -->
    <div id="screen-baker" class="screen"></div>
  </div>

  <!-- Footer -->
  <footer id="app-footer">
    <span>Designed by Cassie 🍰 | Built with Claude Code</span>
    <a href="#" id="baker-link">👩‍🍳 Baker View</a>
  </footer>

  <!-- Recipe Modal -->
  <div id="recipe-modal" class="modal-overlay" hidden>
    <div class="modal-card">
      <div id="recipe-emoji" class="modal-emoji"></div>
      <h2 id="recipe-title" class="modal-title"></h2>
      <p id="recipe-desc" class="modal-desc"></p>
      <div id="recipe-lead" class="modal-lead"></div>
      <h3>Ingredients</h3>
      <ul id="recipe-ingredients"></ul>
      <button class="btn btn-primary" onclick="document.getElementById('recipe-modal').hidden=true">Got it! 😋</button>
    </div>
  </div>

  <!-- Menu Edit Modal (Baker) -->
  <div id="menu-edit-modal" class="modal-overlay" hidden>
    <div class="modal-card modal-form">
      <h2 class="modal-title" id="menu-edit-title">Edit Item</h2>
      <input type="hidden" id="menu-edit-id">
      <div class="form-group">
        <label for="menu-edit-name">Name</label>
        <input type="text" id="menu-edit-name" placeholder="e.g. Banana Cream Pie">
      </div>
      <div class="form-group">
        <label for="menu-edit-emoji">Emoji</label>
        <input type="text" id="menu-edit-emoji" placeholder="e.g. 🍌">
      </div>
      <div class="form-group">
        <label for="menu-edit-desc">Description</label>
        <textarea id="menu-edit-desc" rows="3" placeholder="A short fun description..."></textarea>
      </div>
      <div class="form-group">
        <label for="menu-edit-lead">Lead Days</label>
        <input type="number" id="menu-edit-lead" min="0" max="30" value="0">
      </div>
      <div class="form-group">
        <label for="menu-edit-ingredients">Ingredients (one per line)</label>
        <textarea id="menu-edit-ingredients" rows="6" placeholder="2 cups flour&#10;1 cup sugar&#10;..."></textarea>
      </div>
      <div class="form-group">
        <label for="menu-edit-sort">Sort Order</label>
        <input type="number" id="menu-edit-sort" min="0" value="0">
      </div>
      <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
        <button class="btn btn-primary" id="menu-edit-save">Save</button>
        <button class="btn btn-outline" onclick="document.getElementById('menu-edit-modal').hidden=true">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App Modules -->
  <script src="js/config.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/login.js"></script>
  <script src="js/names.js"></script>
  <script src="js/order.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/baker.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
